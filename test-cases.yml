      - Нажимаем фильтр "Medium"
      - Проверяем, что отображаются только задачи Medium уровня
      - Нажимаем фильтр "Hard"
      - Проверяем, что отображаются только задачи Hard уровня
      - Нажимаем "Все задачи" или отключаем фильтр
      - Проверяем восстановление полного списка
xpected-result: |
      Фильтры работают корректно, отображаются только задачи выбранного уровня
  
summary: |
