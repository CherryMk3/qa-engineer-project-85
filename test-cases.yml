summary: |
      Проверка подсчета побед и поражений
requirement: |
      Система должна отслеживать количество побед, поражений и вычислять рейтинг
prerequisites: |
      - Пользователь завершил минимум 3 игры
      - Выиграл 2 игры, проиграл 1 игру
test-data: |
      Пользователь = user_test
steps:
      - Открываем профиль пользователя
      - Проверяем разделы статистики
      - Проверяем счетчик побед (должен быть 2)
      - Проверяем счетчик поражений (должен быть 1)
      - Проверяем, что данные соответствуют истории игр
expected-result: |
      Пользователь должен увидеть что побед 2, поражений 1, данные соответствуют истории

summary: |
      Проверка расчета рейтинга Elo
requirement: |
      Система должна вычислять рейтинг каждого игрока
prerequisites: |
      - Два пользователя с известными рейтингами
      - Player1 рейтинг 1600, Player2 рейтинг 1400
      - Они завершили игру (Player1 выиграл)
test-data: |
      Player1 рейтинг до игры 1600
      Player2 рейтинг до игры 1400
      Результат Player1 победил
steps:
      - Открываем профиль Player1
      - Проверяем рейтинг (должен увеличиться, например до 1605)
      - Открываем профиль Player2
      - Проверяем рейтинг (должен уменьшиться, например до 1395)
      - Проверяем, что изменения логичны (меньшее изменение для более сильного игрока)
expected-result: |
     Рейтинг Player1 увеличился, рейтинг Player2 уменьшился

summary: |
