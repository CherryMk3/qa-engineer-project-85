summary: |
      Проверка изменения языка во время игры
requirement: |
      Система должна поддерживать разные языки программирования
prerequisites: |
      - Игра активна
      - Текущий язык Python
      - В редакторе есть код
test-data: |
      Код Python print("hello")
steps:
      - В редакторе код на Python
      - Меняем язык на JavaScript
      - Проверяем, что появляется предупреждение "Это удалит текущий код"
      - Нажимаем "Да, изменить"
      - Проверяем, что код удален и редактор очищен
      - Проверяем, что синтаксис-хайлайтинг изменился на JavaScript
expected-result: |
      Язык меняется и синтаксис обновляется      

summary: |
      Проверка успешной проверки решения
requirement: |
      Система должна автоматически проверять решение против набора тестов
prerequisites: |
      - Игра активна
      - Задача: Sum of two numbers
      - Тесты известны sum(2,3)=5, sum(0,0)=0, sum(-1,1)=0
test-data: |
      Решение
      def sum(a, b)
          return a + b
steps:
      - Вводим корректное решение
      - Нажимаем "Submit" или "Check"
      - Проверяем, что система запускает тесты
      - Проверяем, что все тесты проходят (зеленая галочка)
      - Видим сообщение "Все тесты пройдены" или "Solution correct"
      - Проверяем, что результат сохраняется (победа)
expected-result: |
      Все тесты проходят, отображается успешное завершение, результат засчитывается как победа

summary: |
      Проверка неудачной проверки решения
requirement: |
      Система должна отображать результат (пройдено/не пройдено)
prerequisites: |
      - Игра активна
      - Задача с известными тестами
test-data: |
      Неправильное решение:
      def sum(a, b)
          return a  # ошибка: возвращаем только a
steps:
      - Вводим неправильное решение
      - Нажимаем "Submit" или "Check"
      - Проверяем, что система запускает тесты
      - Проверяем, что тесты не проходят (красный крест)
      - Видим сообщение об ошибке с информацией о падающих тестах
      - Видим ожидаемый результат и полученный результат
      - Исправляем код
      - Нажимаем "Submit" снова
      - Проверяем, что исправленный код проходит все тесты
expected-result: |
      Ошибка отображается и после исправления тесты проходят

