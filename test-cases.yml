---
 summary: |
      Проверка отображения кода противника в реальном времени
 requirement: |
      Система должна позволять двум игрокам одновременно видеть код, 
      который пишет друг другу, и следить за ходом решения задачи в реальном времени
 prerequisites: |
      - Два пользователя (Player1 и Player2) зарегистрированы и авторизованы
      - Они находятся в активной игровой сессии
      - На экране каждого игрока открыт редактор кода
 test-data: |
      Player1 логин = user1, пароль = password1
      Player2 логин = user2, пароль = password2
      Задача: Написать функцию для суммы двух чисел
 steps:
      - Player1 открывает редактор кода
      - Player1 начинает вводить текст: "def sum(a, b):"
      - Проверяем, что Player2 видит текст Player1 в реальном времени 
      - Player1 продолжает вводить "return a + b"
      - Проверяем обновление кода у Player2
      - Player2 начинает вводить свой код
      - Проверяем, что Player1 видит код Player2
      - Player1 вводит закрывающие скобки
      - Проверяем синхронизацию на обе стороны
expected-result: |
      Оба игрока видят код друг друга в реальном времени, нет потери символов или искажения текста.
      
summary: |
      Проверка синхронизации при быстром вводе текста
requirement: |
      Система должна позволять двум игрокам одновременно видеть код
prerequisites: |
      - Два игрока в активной сессии
      - Оба имеют доступ к редакторам кода
      - Интернет-соединение со стандартной задержкой
test-data: |
      Длинный текст кода (500+ символов)
steps:
      - Player1 быстро вводит длинный блок кода (копирует и вставляет)
      - Проверяем, что Player2 получает весь текст без потерь
      - Player2 быстро вводит свой код
      - Проверяем корректность отображения на обеих сторонах
      - Проверяем отсутствие задержек или зависаний
expected-result: |
      Весь текст передается корректно, нет пропусков символов, интерфейс остается отзывчивым

summary: |
      Проверка синхронизации при удалении текста
requirement: |
      Система должна позволять двум игрокам одновременно видеть код
prerequisites: |
      - Два игрока в активной сессии
      - Оба начинают с одинакового кода
test-data: |
      Начальный код "def hello(): print('Hello')"
steps:
      - Player1 вводит код
      - Player2 видит полный код
      - Player1 выделяет и удаляет часть текста
      - Проверяем, что Player2 видит удаленный текст
      - Player1 использует Backspace несколько раз
      - Проверяем синхронизацию на Player2
 expected-result: |
      Удаленный текст исчезает у обоих игроков синхронно

summary: |
      Проверка отображения полного списка задач
requirement: |
      Система должна предоставить библиотеку задач различных уровней сложности,
      которые игроки могут выбрать для соревнования
prerequisites: |
      - Пользователь авторизован
      - Открыта страница выбора задачи
test-data: |
      Пользователь = user1
steps:
      - Нажимаем кнопку "Выбрать задачу" или перейти в библиотеку задач
      - Проверяем, что отображается список задач
      - Проверяем, что есть задачи разных уровней: Easy, Medium, Hard
      - Проверяем, что каждая задача содержит название, описание, сложность
      - Пролистываем список задач
      - Проверяем, что все задачи загружаются корректно
expected-result: |
     Отображается минимум 20 задач, видны все три уровня сложности, каждая задача содержит необходимую информацию

